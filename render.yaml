services:
  - type: worker
    name: moon-bot
    runtime: python
    buildCommand: python -m pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt && pip install --no-cache-dir "google-cloud-aiplatform>=1.71.1"
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_ENGINE_ID
        sync: false
      - key: WARGAMING_API_KEY
        sync: false 